<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="MLB 5x5 free-to-play consensus picks — full 2026 season library.">
<meta property="og:title" content="MLB 5x5 Consensus Picks — 2026 Season">
<meta property="og:description" content="Full season library of MLB 5x5 free-to-play moneyline consensus pick data.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+CiAgPHRleHQgeT0iMjYiIGZvbnQtc2l6ZT0iMjgiPuKavjwvdGV4dD4KPC9zdmc+">
<title>MLB 5x5 Consensus Picks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cy: #FFD200;
    --co: #FD5000;
    --cn: #15202B;
    --cs: #253341;
    --cm: #2E3F52;
    --cd: #8899AA;
    --cl: #C8D6E5;
    --cb: #1C2B3A;
    --cbr: #2E3F52;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--cn);
    color: #fff;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 0% 0%, rgba(253,80,0,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 100% 100%, rgba(255,210,0,0.05) 0%, transparent 50%);
  }

  .nav-top {
    display: flex; align-items: center; justify-content: center;
    background: rgba(21,32,43,0.97);
    border-bottom: 3px solid var(--cy);
    padding: 0 24px; height: 56px;
  }
  .nav-center-links { display: flex; gap: 24px; align-items: center; }
  .nav-center-links a {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600; font-size: 0.8rem; letter-spacing: 0.1em;
    text-transform: uppercase; text-decoration: none; color: var(--cd);
    transition: color .15s;
  }
  .nav-center-links a:hover { color: #fff; }
  .nav-center-links .lb {
    color: var(--co); border: 1px solid rgba(253,80,0,0.4);
    padding: 5px 14px; border-radius: 4px;
  }
  .nav-center-links .lb:hover { color: #fff; background: rgba(253,80,0,0.15); }

  .inner { max-width: 1000px; margin: 0 auto; padding: 0 16px; }

  .hero {
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--cbr);
    margin-bottom: 32px;
  }
  .hero-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--co); margin-bottom: 8px;
  }
  .hero-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 3.2rem; font-weight: 900; line-height: 1;
    letter-spacing: -0.01em; text-transform: uppercase;
  }
  .hero-title span { color: var(--cy); }
  .hero-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--cd); margin-top: 10px;
  }
  .stats-row {
    display: flex; gap: 14px; margin-top: 20px; flex-wrap: wrap;
  }
  .stat-pill {
    background: var(--cb); border: 1px solid var(--cbr);
    border-radius: 6px; padding: 10px 20px;
    display: flex; flex-direction: column;
  }
  .stat-pill .num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.7rem; font-weight: 800; color: var(--cy); line-height: 1;
  }
  .stat-pill .lbl {
    font-size: 0.62rem; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--cd); margin-top: 2px;
  }

  .month-group { margin-bottom: 28px; }
  .month-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--co);
    margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 1px solid var(--cbr);
  }

  .pick-card {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--cb); border: 1px solid var(--cbr);
    border-left: 4px solid var(--cbr);
    border-radius: 6px; padding: 14px 20px;
    margin-bottom: 8px; text-decoration: none; color: inherit;
    transition: border-color .2s, border-left-color .2s, transform .15s;
  }
  .pick-card:hover { border-color: var(--cy); border-left-color: var(--cy); transform: translateX(2px); }

  .card-left { display: flex; align-items: center; gap: 16px; }
  .date-badge {
    background: var(--cs); border: 1px solid var(--cm);
    border-radius: 6px; padding: 7px 14px;
    text-align: center; min-width: 58px;
  }
  .date-badge .day {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.4rem; font-weight: 900; color: var(--cy); line-height: 1;
  }
  .date-badge .mon {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.62rem; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--cd); margin-top: 1px;
  }
  .card-info .title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 700; letter-spacing: 0.03em;
    text-transform: uppercase; color: #fff;
  }
  .card-info .meta {
    font-size: 0.75rem; color: var(--cd); margin-top: 3px;
  }
  .card-right {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.82rem; font-weight: 700; letter-spacing: 0.06em;
    color: var(--cy); text-transform: uppercase;
  }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--cd); font-size: 0.9rem; }

  .week-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.78rem;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--cy);
    padding: 10px 14px 8px;
    margin: 12px 0 8px;
    background: rgba(255,210,0,0.07);
    border-left: 3px solid var(--cy);
    border-radius: 0 4px 4px 0;
  }
  .scoreboards {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .scoreboard {
    flex: 0 0 auto;
    background: var(--cb);
    border: 1px solid var(--cbr);
    border-radius: 8px;
    padding: 18px 22px;
    position: relative;
    overflow: hidden;
  }
  .scoreboard.current {
    border-color: var(--cy);
    background: linear-gradient(135deg, rgba(255,210,0,0.08) 0%, var(--cb) 60%);
  }
  .scoreboard.season {
    border-color: var(--co);
    background: linear-gradient(135deg, rgba(253,80,0,0.08) 0%, var(--cb) 60%);
  }
  .scoreboard-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .scoreboard.current .scoreboard-label { color: var(--cy); }
  .scoreboard.season  .scoreboard-label { color: var(--co); }
  .scoreboard-stats {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }
  .scoreboard-stat .num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    line-height: 1;
    color: #fff;
  }
  .scoreboard-stat .lbl {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--cd);
    margin-top: 3px;
  }
  .site-footer {
    text-align: center; padding: 32px 16px;
    font-size: 0.65rem; color: var(--cm); letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<nav class="nav-top">
  <div class="nav-center-links">
    <a href="https://freeplay.covers.com/games/mlb-5x5/leaderboard" target="_blank" class="lb">&#127942; Leaderboard</a>
  </div>
</nav>

<div class="inner">
  <div class="hero">
    <div class="hero-eyebrow">2026 Season &mdash; Free-to-Play</div>
    <div class="hero-title">MLB 5x5 <span>Consensus</span></div>
    <div class="hero-sub">Daily Moneyline Pick Distribution</div>
  </div>

  <div class="scoreboards" id="scoreboards"></div>
  <div id="seasonGrid">
    <div class="empty-state">No pick files found yet.</div>
  </div>
</div>

<div class="site-footer" id="footer">v4 &nbsp;&middot;&nbsp; Updated April 8, 2026</div>

<script>
  // ─── REGISTRY ────────────────────────────────────────────────────────────────
  const PICKS = [
    { date: "2026-03-30", entries: 794,  games: 15 },
    { date: "2026-03-31", entries: 827,  games: 14 },
    { date: "2026-04-01", entries: 513,  games: 14 },
    { date: "2026-04-02", entries: 610,  games: 3 },
    { date: "2026-04-03", entries: 442,  games: 13 },
    { date: "2026-04-06", entries: 1055,  games: 12 },
    { date: "2026-04-07", entries: 680,  games: 15 },
  ];
  // ─────────────────────────────────────────────────────────────────────────────

  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const FMONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

  function parseDate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); }

  function render() {
    if (!PICKS.length) return;
    const sorted = [...PICKS].sort((a,b) => b.date.localeCompare(a.date));
    const totalEntries = PICKS.reduce((s,p) => s+p.entries, 0);
    const totalGames   = PICKS.reduce((s,p) => s+p.games, 0);

    // Week calculation
    const allByDate = [...PICKS].sort((a,b) => a.date.localeCompare(b.date));
    const currentWeekNum = Math.floor((allByDate.length - 1) / 5) + 1;
    const weekStart = (currentWeekNum - 1) * 5;
    const currentWeekDays = allByDate.slice(weekStart);
    const cwEntries = currentWeekDays.reduce((s,p) => s+p.entries, 0);
    const cwGames   = currentWeekDays.reduce((s,p) => s+p.games, 0);
    const cwDays    = currentWeekDays.length;

    document.getElementById('scoreboards').innerHTML = `
      <div class="scoreboard current">
        <div class="scoreboard-label">⚡ Week ${currentWeekNum} — Current</div>
        <div class="scoreboard-stats">
          <div class="scoreboard-stat"><div class="num">${cwEntries.toLocaleString()}</div><div class="lbl">Entries</div></div>
          <div class="scoreboard-stat"><div class="num">${cwGames}</div><div class="lbl">Games</div></div>
          <div class="scoreboard-stat"><div class="num">${cwDays}</div><div class="lbl">Days</div></div>
        </div>
      </div>
      <div class="scoreboard season">
        <div class="scoreboard-label">📅 Season to Date</div>
        <div class="scoreboard-stats">
          <div class="scoreboard-stat"><div class="num">${totalEntries.toLocaleString()}</div><div class="lbl">Entries</div></div>
          <div class="scoreboard-stat"><div class="num">${totalGames}</div><div class="lbl">Games</div></div>
          <div class="scoreboard-stat"><div class="num">${PICKS.length}</div><div class="lbl">Days</div></div>
        </div>
      </div>
    `;



    const byMonth = {};
    sorted.forEach(p => {
      const d = parseDate(p.date);
      const key = `${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}`;
      if (!byMonth[key]) byMonth[key] = { label: FMONTHS[d.getMonth()] + ' ' + d.getFullYear(), items: [] };
      byMonth[key].items.push(p);
    });

    const grid = document.getElementById('seasonGrid');
    grid.innerHTML = '';
    // Assign week numbers (5 contest days per week)
    const allSorted = [...PICKS].sort((a,b) => a.date.localeCompare(b.date));
    const weekMap = {};
    allSorted.forEach((p, i) => { weekMap[p.date] = Math.floor(i / 5) + 1; });

    Object.values(byMonth).forEach(group => {
      const sec = document.createElement('div');
      sec.className = 'month-group';
      sec.innerHTML = `<div class="month-label">${group.label}</div>`;
      let lastWeek = null;
      group.items.forEach(p => {
        const week = weekMap[p.date];
        if (week !== lastWeek) {
          const wDiv = document.createElement('div');
          wDiv.className = 'week-label';
          wDiv.textContent = 'Week ' + week;
          sec.appendChild(wDiv);
          lastWeek = week;
        }
        const d = parseDate(p.date);
        const a = document.createElement('a');
        a.className = 'pick-card';
        a.href = `picks/${p.date}.html`;
        a.innerHTML = `
          <div class="card-left">
            <div class="date-badge">
              <div class="day">${d.getDate()}</div>
              <div class="mon">${MONTHS[d.getMonth()]}</div>
            </div>
            <div class="card-info">
              <div class="title">${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}</div>
              <div class="meta">${p.entries.toLocaleString()} entries &nbsp;&middot;&nbsp; ${p.games} games</div>
            </div>
          </div>
          <div class="card-right">View &#8594;</div>`;
        sec.appendChild(a);
      });
      grid.appendChild(sec);
    });
  }

  render();
</script>
</body>
</html>
