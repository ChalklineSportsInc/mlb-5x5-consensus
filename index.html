<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB 5x5 Consensus Picks</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
    padding: 32px 16px 64px;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
  }
  .header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
  }
  .header .subtitle {
    font-size: 0.9rem;
    color: #8b949e;
    margin-top: 8px;
  }
  .header .pill {
    display: inline-block;
    background: #1f2937;
    border: 1px solid #30363d;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.75rem;
    color: #58a6ff;
    margin-top: 12px;
  }

  .season-grid {
    max-width: 760px;
    margin: 0 auto;
  }

  .month-group {
    margin-bottom: 32px;
  }
  .month-label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #8b949e;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid #21262d;
  }

  .pick-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 10px;
    padding: 14px 20px;
    margin-bottom: 10px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, background 0.2s;
  }
  .pick-card:hover {
    border-color: #388bfd;
    background: #1c2333;
  }

  .card-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .date-badge {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 6px 12px;
    text-align: center;
    min-width: 56px;
  }
  .date-badge .day {
    font-size: 1.2rem;
    font-weight: 700;
    color: #58a6ff;
    line-height: 1;
  }
  .date-badge .month {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #8b949e;
    margin-top: 2px;
  }

  .card-info .title {
    font-size: 0.9rem;
    font-weight: 600;
    color: #f0f6fc;
  }
  .card-info .meta {
    font-size: 0.75rem;
    color: #8b949e;
    margin-top: 3px;
  }

  .card-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .arrow {
    color: #388bfd;
    font-size: 1rem;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #8b949e;
    font-size: 0.9rem;
  }
  .empty-state .icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
  }

  .stats-bar {
    max-width: 760px;
    margin: 0 auto 32px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 0.8rem;
    color: #8b949e;
  }
  .stat-pill strong {
    color: #f0f6fc;
    font-size: 1.1rem;
    display: block;
    margin-bottom: 2px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>⚾ MLB 5x5 Consensus Picks</h1>
  <div class="subtitle">Free-to-Play · Moneyline · 2026 Season</div>
  <div class="pill" id="totalDays">Loading...</div>
  <div style="margin-top:12px"><a href="https://freeplay.covers.com/games/mlb-5x5/leaderboard" target="_blank" style="color:#58a6ff;font-size:0.85rem;text-decoration:none;">🏆 View Leaderboard</a></div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="season-grid" id="seasonGrid">
  <div class="empty-state">
    <div class="icon">📋</div>
    <div>No pick files found.<br>Add HTML files to the <code>picks/</code> folder.</div>
  </div>
</div>

<script>
  // ─── REGISTRY ───────────────────────────────────────────────────────────────
  // Add a new entry here each day you upload a picks file.
  // Format: { date: "YYYY-MM-DD", entries: 000, games: 00 }
  // The file is assumed to live at picks/YYYY-MM-DD.html
  const PICKS = [
    { date: "2026-03-30", entries: 525,  games: 15 },
    { date: "2026-03-31", entries: 537,  games: 14 },
  ];
  // ────────────────────────────────────────────────────────────────────────────

  const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const FULL_MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  function parseDate(str) {
    const [y, m, d] = str.split('-').map(Number);
    return new Date(y, m - 1, d);
  }

  function render() {
    if (!PICKS.length) return;

    // Sort descending
    const sorted = [...PICKS].sort((a, b) => b.date.localeCompare(a.date));

    // Stats
    const totalEntries = PICKS.reduce((s, p) => s + p.entries, 0);
    const totalGames   = PICKS.reduce((s, p) => s + p.games, 0);
    document.getElementById('totalDays').textContent = `${PICKS.length} day${PICKS.length !== 1 ? 's' : ''} tracked`;
    document.getElementById('statsBar').innerHTML = `
      <div class="stat-pill"><strong>${PICKS.length}</strong>Days Tracked</div>
      <div class="stat-pill"><strong>${totalEntries.toLocaleString()}</strong>Total Entries</div>
      <div class="stat-pill"><strong>${totalGames}</strong>Games Covered</div>
    `;

    // Group by month
    const byMonth = {};
    sorted.forEach(p => {
      const d = parseDate(p.date);
      const key = `${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}`;
      if (!byMonth[key]) byMonth[key] = { label: FULL_MONTHS[d.getMonth()] + ' ' + d.getFullYear(), items: [] };
      byMonth[key].items.push(p);
    });

    const grid = document.getElementById('seasonGrid');
    grid.innerHTML = '';

    Object.values(byMonth).forEach(group => {
      const section = document.createElement('div');
      section.className = 'month-group';
      section.innerHTML = `<div class="month-label">${group.label}</div>`;

      group.items.forEach(p => {
        const d = parseDate(p.date);
        const dayNum  = d.getDate();
        const monAbbr = MONTH_NAMES[d.getMonth()];
        const weekday = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()];

        const a = document.createElement('a');
        a.className = 'pick-card';
        a.href = `picks/${p.date}.html`;
        a.innerHTML = `
          <div class="card-left">
            <div class="date-badge">
              <div class="day">${dayNum}</div>
              <div class="month">${monAbbr}</div>
            </div>
            <div class="card-info">
              <div class="title">${weekday}, ${monAbbr} ${dayNum}</div>
              <div class="meta">${p.entries.toLocaleString()} entries &nbsp;·&nbsp; ${p.games} games</div>
            </div>
          </div>
          <div class="card-right">
            <div class="arrow">→</div>
          </div>
        `;
        section.appendChild(a);
      });

      grid.appendChild(section);
    });
  }

  render();
</script>
</body>
</html>
