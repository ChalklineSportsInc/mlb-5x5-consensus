name: Generate Consensus Picks

on:
  push:
    paths:
      - 'csv/*.csv'

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas

      - name: Process new CSV and clean up
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'csv/*.csv' | grep -v '^$' | head -1)
          if [ -z "$CHANGED" ]; then
            echo "No new CSV detected, skipping."
            exit 0
          fi
          echo "Processing: $CHANGED"
          python generate_picks.py "$CHANGED"
          git rm "$CHANGED"
          echo "Deleted $CHANGED from csv/ folder"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add picks/ index.html
          git diff --cached --quiet || git commit -m "Auto-generate picks from CSV"
          git push
