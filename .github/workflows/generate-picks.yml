name: Generate Consensus Picks

on:
  push:
    paths:
      - 'csv/*.csv'   # triggers whenever a CSV is pushed to the csv/ folder

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push the generated HTML back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas

      - name: Find new CSV files and generate HTML
        run: |
          for csv in csv/*.csv; do
            echo "Generating picks for $csv"
            python generate_picks.py "$csv"
          done

      - name: Commit and push generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add picks/ index.html
          git diff --cached --quiet || git commit -m "Auto-generate picks from CSV"
          git push
