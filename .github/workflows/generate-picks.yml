name: Generate Consensus Picks

on:
  push:
    paths:
      - 'csv/*.csv'

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas

      - name: Find changed CSV and generate HTML
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'csv/*.csv')
          if [ -z "$CHANGED" ]; then
            echo "No CSV changes detected, skipping."
            exit 0
          fi
          for csv in $CHANGED; do
            echo "Generating picks for $csv"
            python generate_picks.py "$csv"
          done

      - name: Commit and push generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add picks/ index.html
          git diff --cached --quiet || git commit -m "Auto-generate picks from CSV"
          git push
